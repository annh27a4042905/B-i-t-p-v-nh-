<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>btvn buổi 9</title>
    </head>
    <body>
        <form>
            <label>
                <p>Họ và tên: <input type="text" id="name" name="fullName"></p>
            </label>
            <label>
                <p>Mã sinh viên: <input type="text" id="studentId" name="studentId"></p>
            </label>
            <button type="button" onclick="displayIntroduce()">Giới thiệu</button>
        </form>
        <p id="introduce"></p>
        <script>
            function displayIntroduce(){
                let fullName = document.getElementById("name").value; 
                let studentId = document.getElementById("studentId").value;
                let coursePeriod = studentId.substring(0,2);
                let facultyId = studentId.substring(2,6);
                let faculty = "";
                let introduce="";
                let sum = 0;
                switch (facultyId) {
                    case "A401":
                        faculty = "Ngân hàng"; 
                        break;
                    case "A402":
                        faculty = "Kế toán và kiểm toán";
                        break;
                    case "A403":
                        faculty = "Quản trị kinh doanh";
                        break;
                    case "A404":
                        faculty = "Công nghệ thông tin và kinh tế số";
                        break;
                    case "A405":
                        faculty = "Kinh doanh quốc tế";
                        break;
                    case "A406":
                        faculty = "Luật";
                        break;
                    case "A407":
                        faculty = "Kinh tế";
                        break;
                    case "A408":
                        faculty = "Khoa học dữ liệu";
                        break;
                    case "A751":
                        faculty = "Ngôn ngữ";
                        break;
                    default:
                        faculty = "Không xác định";
                }
                for (let index =  studentId.length-1; index >= studentId.length - 4; index--) {
                    sum += Number(studentId[index]);
                }
                    introduce = "Xin chào "+fullName+", bạn là sinh viên khóa "+ coursePeriod
                    +", khoa "+ faculty+", tổng 4 số cuối trong mã sinh viên là "+sum+". Email là: "+taoEmail(fullName, studentId);
                    document.getElementById("introduce").innerHTML = "<h3>Kết quả xử lý</h3>"+introduce;
            }
            function taoEmail(fullName, studentId){
                let email="";
                let start = 0;
                for (let index = fullName.length-1; index >= 0; index--) {
                    if(fullName[index] == ' '){
                        start = index;
                        for (let i = start + 1; i < fullName.length; i++) {
                            email += fullName[i];
                        }
                    break;
                    }
                }
            
                for (let index = 0; index < fullName.length; index++) {
                    if(index == 0){
                        email += fullName[index];
                    }
                    if(fullName[index]==' ' && index < start){
                        email += fullName[index+1];
                    }
                } 
                email = email.toLowerCase();
                email += "."+studentId+"@hvnh.edu.vn";
                return email;
            }
        </script>
    </body>
</html>
